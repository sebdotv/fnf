name: Build RPM

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y cargo rust-packaging rpm-build git

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build source tarballs
        run: bash pkg/make-sources.sh

      - name: Build RPM
        run: |
          rpmbuild -ba pkg/fnf.spec \
            --define "_sourcedir $(pwd)/pkg" \
            --define "_rpmdir $(pwd)/pkg/rpm" \
            --define "_srcrpmdir $(pwd)/pkg/rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rpm
          path: pkg/rpm/**/*.rpm

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/rpm/**/*.rpm
